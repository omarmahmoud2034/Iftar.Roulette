<!DOCTYPE html>
<html>
<head>
    <title>Iftar Roulette</title>
    <style>
        body { font-family: Arial; margin:0; background:#f4f4f4; }
        header { background:#8B0000; color:white; padding:15px; text-align:center; }
        nav button { margin:5px; padding:10px; cursor:pointer; }
        .container { padding:20px; }
        .hidden { display:none; }
        input, button { padding:8px; margin:5px; }
        .menu-item, .order-box { background:white; padding:10px; margin:10px 0; border-radius:5px; }
        #cart { background:white; padding:10px; margin-top:15px; border-radius:5px; }
        h2 { color:#8B0000; }
    </style>
</head>
<body>

<header>
    <h1>Iftar Roulette 🍽️</h1>
    <nav>
        <button onclick="showSection('signup')">Sign Up</button>
        <button onclick="showSection('login')">Login</button>
        <button onclick="showSection('menu')">Menu</button>
        <button onclick="showSection('admin')">Admin</button>
    </nav>
</header>

<div class="container">

<div id="signup" class="hidden">
    <h2>Sign Up</h2>
    <input id="signupUser" placeholder="Username"><br>
    <input id="signupPass" type="password" placeholder="Password"><br>
    <button onclick="signup()">Create Account</button>
</div>

<div id="login" class="hidden">
    <h2>Login</h2>
    <input id="loginUser" placeholder="Username"><br>
    <input id="loginPass" type="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
</div>

<div id="menu" class="hidden">
    <h2>Menu</h2>
    <div id="menuList"></div>

    <h3>Cart</h3>
    <div id="cart"></div>
    <button onclick="checkout()">Checkout</button>
</div>

<div id="admin" class="hidden">
    <h2>Admin</h2>
    <input id="adminUser" placeholder="Admin"><br>
    <input id="adminPass" type="password" placeholder="Password"><br>
    <button onclick="adminLogin()">Login</button>

    <div id="adminPanel" class="hidden">
        <h3>Orders</h3>
        <div id="ordersList"></div>
    </div>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDNQ5ru0wFfKiGyNqL2SKij0SjdW0bxgN8",
  authDomain: "iftarroulette.firebaseapp.com",
  projectId: "iftarroulette",
  storageBucket: "iftarroulette.firebasestorage.app",
  messagingSenderId: "358782144172",
  appId: "1:358782144172:web:0bea1bba36f72eb43e1909"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = null;
let cart = [];

function showSection(id){
    document.querySelectorAll('.container > div').forEach(d=>d.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}

function signup(){
    localStorage.setItem("user_"+signupUser.value, signupPass.value);
    alert("Account created");
}

function login(){
    if(localStorage.getItem("user_"+loginUser.value)===loginPass.value){
        currentUser = loginUser.value;
        showSection("menu");
        loadMenu();
    } else alert("Wrong login");
}

function adminLogin(){
    if(adminUser.value==="admin" && adminPass.value==="iftaradmin"){
        adminPanel.classList.remove("hidden");
        loadOrders();
    } else alert("Wrong admin");
}

function getMenu(){
    return [
        {name:"Shawarma", price:8},
        {name:"Harira Soup", price:6},
        {name:"Dates & Milk", price:5}
    ];
}

function loadMenu(){
    menuList.innerHTML="";
    getMenu().forEach(item=>{
        menuList.innerHTML+=`
        <div class="menu-item">
            <strong>${item.name}</strong> - ${item.price} SAR
            <button onclick="addToCart('${item.name}',${item.price})">Add</button>
        </div>`;
    });
}

function addToCart(name,price){
    cart.push({name,price});
    updateCart();
}

function updateCart(){
    let total=0;
    let div=document.getElementById("cart");
    div.innerHTML="";
    cart.forEach(i=>{
        total+=i.price;
        div.innerHTML+=`<p>${i.name} - ${i.price} SAR</p>`;
    });
    div.innerHTML+=`<b>Total: ${total} SAR</b>`;
}

async function checkout(){
    if(cart.length===0) return alert("Cart is empty");

    let total = cart.reduce((s,i)=>s+i.price,0);

    let order={
        user: currentUser,
        items: cart,
        total: total,
        date: new Date().toLocaleString()
    };

    await db.collection("orders").add(order);

    printReceipt(order);

    cart=[];
    updateCart();

    alert("Order saved & printed");
}

function printReceipt(order){
    let w=window.open("");
    w.document.write(`
        <h2>Iftar Roulette Receipt</h2>
        <p>User: ${order.user}</p>
        <p>Date: ${order.date}</p>
        <ul>
            ${order.items.map(i=>`<li>${i.name} - ${i.price} SAR</li>`).join("")}
        </ul>
        <h3>Total: ${order.total} SAR</h3>
    `);
    w.print();
}

async function loadOrders(){
    let snap = await db.collection("orders").get();
    ordersList.innerHTML="";
    snap.forEach(doc=>{
        let o=doc.data();
        ordersList.innerHTML+=`
        <div class="order-box">
            <strong>${o.user}</strong><br>
            ${o.date}<br>
            Total: ${o.total} SAR
        </div>`;
    });
}
</script>

</body>
</html>
